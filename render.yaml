services:
  - type: web
    name: foyer
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: FOYER_DB_PATH
        value: /opt/render/project/src/data/foyer.db
      # Domain allowed to sign in to the admin dashboards.
      - key: ADMIN_EMAIL_DOMAIN
        value: foyer.com
      # Set these in the Render dashboard (Environment tab) — do not commit
      # real values to this file:
      #   ADMIN_PASSWORD      (REQUIRED — the shared dashboard password)
      #   AUTH_SECRET         (REQUIRED — long random string, signs sessions)
      #   GROQ_API_KEY
      #   GROQ_MODEL          (optional, defaults to llama-3.3-70b-versatile)
      #   GMAIL_USER
      #   GMAIL_APP_PASSWORD
      #   EMAIL_FROM_NAME
